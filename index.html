<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindMirror FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0f;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

textarea {
  width:100%;
  height:140px;
  background:#111;
  color:white;
  padding:10px;
  border:1px solid #333;
}

button {
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}

.card {
  margin-top:20px;
  padding:15px;
  background:#111;
  border-radius:10px;
  display:none;
}

#debug {
  color:#aaa;
  margin-top:10px;
  font-size:12px;
}

mark {
  background:yellow;
  color:black;
}
</style>
</head>

<body>

<div class="container">

<h2>MindMirror (SAFE MODE)</h2>

<textarea id="input"></textarea>

<button onclick="run()">Analyze</button>
<button onclick="loadSample()">Load Sample</button>

<div id="debug"></div>

<div id="output" class="card"></div>

<canvas id="chart" class="card"></canvas>

</div>

<script>

let chart = null;

function loadSample(){
  document.getElementById("input").value =
  "I always fail everything. This is the worst thing ever. I will never succeed.";
}

function run(){

  const input = document.getElementById("input").value;
  const debug = document.getElementById("debug");

  debug.innerText = "Step 1: JS running ✔";

  if(!input || input.trim().length === 0){
    debug.innerText = "ERROR: empty input";
    return;
  }

  try {

    debug.innerText += "\nStep 2: analyzing...";

    const result = analyze(input);

    debug.innerText += "\nStep 3: rendering...";

    render(result);

    debug.innerText += "\nDONE ✔";

  } catch(err){
    console.log(err);
    debug.innerText = "CRASH: " + err.message;
  }
}

function analyze(text){

  const patterns = {
    catastrophizing: /(worst|terrible|hopeless|ruined)/gi,
    overgeneralization: /(always|never|everyone|nobody)/gi,
    absolutist: /(completely|totally|must|perfect)/gi
  };

  let counts = {
    catastrophizing: 0,
    overgeneralization: 0,
    absolutist: 0
  };

  let rendered = text;

  // SAFE replace (no indexing = no silent crash)
  for(const key in patterns){
    rendered = rendered.replace(patterns[key], (m) => {
      counts[key]++;
      return `<mark>${m}</mark>`;
    });
  }

  return { text, rendered, counts };
}

function render(data){

  const out = document.getElementById("output");
  const chartEl = document.getElementById("chart");

  // FORCE SHOW (critical fix)
  out.style.display = "block";
  chartEl.style.display = "block";

  out.innerHTML = `
    <h3>Results</h3>
    <p>${data.rendered}</p>
    <ul>
      <li>Catastrophizing: ${data.counts.catastrophizing}</li>
      <li>Overgeneralization: ${data.counts.overgeneralization}</li>
      <li>Absolutist: ${data.counts.absolutist}</li>
    </ul>
  `;

  // SAFE chart reset
  try {
    if(chart) chart.destroy();

    chart = new Chart(chartEl, {
      type:"bar",
      data:{
        labels:Object.keys(data.counts),
        datasets:[{
          data:Object.values(data.counts),
          backgroundColor:["#ef4444","#f59e0b","#8b5cf6"]
        }]
      },
      options:{
        plugins:{ legend:{ display:false } }
      }
    });

  } catch(e){
    console.log("Chart failed:", e);
  }
}

</script>

</body>
</html>
