<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MindMirror — Cognitive Insight Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0b1020;
  --bg2:#0f1a33;
  --card:rgba(255,255,255,0.06);
  --card2:rgba(255,255,255,0.09);
  --text:#eaf0ff;
  --muted:#a9b4d0;
  --accent:#7c5cff;
  --accent2:#22d3ee;
  --good:#10b981;
  --warn:#f59e0b;
  --bad:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter;}

body{
  min-height:100vh;
  background: radial-gradient(circle at 20% 20%, #1a2a5a 0%, transparent 40%),
              radial-gradient(circle at 80% 20%, #3b1b6a 0%, transparent 45%),
              radial-gradient(circle at 50% 100%, #0ea5e9 0%, transparent 50%),
              var(--bg1);
  color:var(--text);
  padding:40px 20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.header{
  text-align:center;
  margin-bottom:30px;
}

h1{
  font-size:40px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:var(--muted);
  margin-top:8px;
}

.card{
  background:var(--card);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius:16px;
  padding:18px;
  margin-top:16px;
}

textarea{
  width:100%;
  min-height:140px;
  padding:14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.25);
  color:white;
  resize:none;
}

button{
  margin-top:12px;
  padding:12px 16px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  transform:translateY(-1px);
}

.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(124,92,255,0.15);
  border:1px solid rgba(124,92,255,0.3);
  font-size:12px;
  color:#c9c2ff;
  margin-top:10px;
}

.result{
  margin-top:20px;
}

.item{
  padding:12px;
  border-radius:12px;
  background:var(--card2);
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>MindMirror</h1>
    <div class="subtitle">Relationship-aware cognitive pattern analysis engine</div>
    <div class="badge">Educational psychological modeling — not clinical diagnosis</div>
  </div>

  <div class="card">
    <textarea id="text" placeholder="Type thoughts like: I feel like I'm not enough for my partner..."></textarea>
    <button onclick="analyze()">Analyze Thought Patterns</button>
  </div>

  <div id="output"></div>

</div>

<script>

/* =========================
   RELATIONSHIP-FOCUSED THEMES
========================= */

const THEMES = {
  relationships:{
    keywords:["partner","love","relationship","dating","romantic","boyfriend","girlfriend","they","her","him"],
    insight:"This reflects interpersonal attachment and emotional evaluation within relationships."
  },
  selfWorth:{
    keywords:["not enough","worthless","failure","inadequate","unlovable","replaceable","better than me"],
    insight:"This reflects identity-level self-evaluation tied to perceived relational value."
  },
  attachmentAnxiety:{
    keywords:["leave","abandon","don't care","losing them","they'll go","they will leave"],
    insight:"This suggests fear-based attachment processing and uncertainty intolerance in relationships."
  }
};

/* =========================
   DISTORTIONS (EXPANDED)
========================= */

const DISTORTIONS = {
  catastrophizing:{
    label:"Catastrophizing",
    explain:"Turning emotional uncertainty into worst-case relational outcomes.",
    examples:[
      "This relationship will completely fall apart.",
      "Everything is going to end badly between us.",
      "I’ll lose them and never recover."
    ]
  },

  overgeneralization:{
    label:"Overgeneralization",
    explain:"Turning one relational experience into a universal rule.",
    examples:[
      "No one ever stays with me.",
      "Every relationship ends the same way.",
      "I always mess things up."
    ]
  },

  emotional:{
    label:"Emotional Reasoning",
    explain:"Assuming feelings directly reflect relationship reality.",
    examples:[
      "I feel unworthy so I must be unworthy.",
      "It feels like they don’t care so it must be true.",
      "I feel replaceable therefore I am."
    ]
  },

  mindReading:{
    label:"Mind Reading",
    explain:"Assuming you know what others think without evidence.",
    examples:[
      "They think I’m not good enough.",
      "They’re bored of me.",
      "They secretly want someone better."
    ]
  },

  rejectionSensitivity:{
    label:"Rejection Sensitivity",
    explain:"Interpreting ambiguous signals as rejection.",
    examples:[
      "They replied late so they must not care.",
      "They seem distant so they’re leaving me.",
      "Small changes in tone mean rejection."
    ]
  },

  emotionalDependence:{
    label:"Emotional Dependence",
    explain:"Emotional stability becomes overly dependent on another person’s behavior.",
    examples:[
      "I can’t feel okay unless they reassure me.",
      "Their mood determines my worth.",
      "I need them to feel stable."
    ]
  },

  selfWorthLink:{
    label:"Self-Worth Linking",
    explain:"Tying personal value directly to relationship outcomes.",
    examples:[
      "If they don’t love me I’m worthless.",
      "Being chosen defines my value.",
      "Their attention determines my worth."
    ]
  }
};

/* =========================
   ANALYSIS
========================= */

function detect(text){
  const t = text.toLowerCase();
  const found=[];

  for(const [k,v] of Object.entries(DISTORTIONS)){
    const hit =
      v.explain &&
      (
        t.includes(k) ||
        v.examples.some(e => e.toLowerCase().split(" ").some(w => t.includes(w)))
      );

    if(hit) found.push(v);
  }

  return found;
}

function detectThemes(text){
  const t=text.toLowerCase();
  return Object.values(THEMES).filter(t2=>t2.keywords.some(k=>t.includes(k)));
}

/* =========================
   INSIGHT ENGINE (UPGRADED)
========================= */

function insight(text, dist, themes){

  const t = themes.length
    ? "The thought is strongly rooted in relational interpretation and attachment-based reasoning."
    : "The thought is general cognitive processing without a dominant relational trigger.";

  const d = dist.length
    ? "Multiple cognitive distortions are influencing interpretation, particularly in how meaning is assigned to social signals."
    : "No dominant distortions detected in interpretation structure.";

  return `
${t}

${d}

In relational cognition, the mind often converts uncertainty into narrative certainty — especially around attachment, acceptance, and self-worth.

This does not reflect truth, but internal prediction patterns shaped by emotional experience.
  `.trim();
}

/* =========================
   MAIN
========================= */

function analyze(){

  const text=document.getElementById("text").value;
  const out=document.getElementById("output");

  const dist=detect(text);
  const themes=detectThemes(text);

  const result=insight(text,dist,themes);

  out.innerHTML=`
    <div class="card result">
      <h2>Psychological Interpretation</h2>
      <p style="color:var(--muted);white-space:pre-line">${result}</p>
    </div>

    <div class="card">
      <h3>Detected Patterns</h3>
      ${dist.length
        ? dist.map(d=>`
          <div class="item">
            <b>${d.label}</b><br/>
            <span style="color:var(--muted)">${d.explain}</span>
          </div>
        `).join("")
        : "<p style='color:var(--muted)'>No strong distortions detected.</p>"
      }
    </div>

    <div class="card">
      <h3>Example Cognitive Reframes</h3>
      ${dist.map(d=>`
        <div class="item">
          <b>${d.label}</b><br/>
          <span style="color:var(--good)">
            ${d.examples[Math.floor(Math.random()*d.examples.length)]}
          </span>
        </div>
      `).join("")}
    </div>
  `;
}

</script>

</body>
</html>
