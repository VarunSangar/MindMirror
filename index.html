<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMirror — Cognitive Pattern Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
/* ===== BASE ===== */
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: Inter, sans-serif;
  background:#0a0a0f;
  color:#e8e8f0;
  overflow-x:hidden;
}

header {
  text-align:center;
  padding:2rem;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

h1 {
  background: linear-gradient(135deg,#4f8ef7,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-size:2.5rem;
}

textarea {
  width:100%;
  min-height:140px;
  background:#111;
  color:white;
  border:1px solid #333;
  padding:1rem;
  border-radius:10px;
}

button {
  padding:10px 16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.primary {
  background:linear-gradient(135deg,#4f8ef7,#8b5cf6);
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:1.5rem;
}

.card {
  background:#111118;
  border:1px solid rgba(255,255,255,0.08);
  padding:1rem;
  border-radius:12px;
  margin-top:1rem;
}

.hidden { display:none; }

.highlight {
  padding:2px 4px;
  border-radius:4px;
}
</style>
</head>

<body>

<header>
  <h1>MindMirror</h1>
  <p>Cognitive Pattern Analysis Through Language</p>
</header>

<div class="container">

  <textarea id="input" placeholder="Write something like: I always fail everything and nothing ever works..."></textarea>

  <div style="margin-top:10px;">
    <button class="primary" onclick="analyze()">Analyze Text</button>
    <button onclick="loadSample()">Load Sample</button>
  </div>

  <div id="status" style="margin-top:10px;color:#aaa;"></div>

  <div id="output" class="card hidden"></div>
  <canvas id="chart" class="card hidden"></canvas>

</div>

<script>
let chartInstance = null;

const patterns = {
  catastrophizing: /(worst|terrible|disaster|ruined|hopeless|doomed)/gi,
  overgeneralization: /(always|never|every|nobody|everyone|constantly)/gi,
  absolutist: /(must|have to|completely|totally|perfect)/gi
};

function loadSample() {
  document.getElementById("input").value =
  "I always mess everything up. This is the worst day ever. I completely ruined everything and I will never recover.";
}

function analyze() {
  const text = document.getElementById("input").value.trim();
  const output = document.getElementById("output");
  const status = document.getElementById("status");

  if (!text) {
    status.innerText = "Please enter text first.";
    return;
  }

  status.innerText = "Analyzing cognitive patterns...";

  try {
    const result = runAnalysis(text);

    renderOutput(result);
    renderChart(result);

    output.classList.remove("hidden");
    document.getElementById("chart").classList.remove("hidden");

    status.innerText = "Analysis complete ✔";

  } catch (err) {
    console.error(err);
    status.innerText = "Something went wrong — check console.";
  }
}

function runAnalysis(text) {
  let counts = {
    catastrophizing: 0,
    overgeneralization: 0,
    absolutist: 0
  };

  let highlighted = text;

  for (let key in patterns) {
    highlighted = highlighted.replace(patterns[key], (match) => {
      counts[key]++;
      return `<span class="highlight">${match}</span>`;
    });
  }

  return { text, highlighted, counts };
}

function renderOutput(data) {
  const el = document.getElementById("output");

  el.innerHTML = `
    <h3>Detected Patterns</h3>
    <p>${data.highlighted}</p>
    <ul>
      <li>Catastrophizing: ${data.counts.catastrophizing}</li>
      <li>Overgeneralization: ${data.counts.overgeneralization}</li>
      <li>Absolutist: ${data.counts.absolutist}</li>
    </ul>
  `;
}

function renderChart(data) {
  const ctx = document.getElementById("chart");

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(data.counts),
      datasets: [{
        label: "Detected Intensity",
        data: Object.values(data.counts),
        backgroundColor: ["#ef4444","#f59e0b","#8b5cf6"]
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } }
    }
  });
}
</script>

</body>
</html>
