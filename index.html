<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMirror</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0f;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

textarea {
  width:100%;
  height:140px;
  background:#111;
  color:white;
  padding:10px;
}

button {
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}

.card {
  margin-top:20px;
  padding:15px;
  background:#111;
  border-radius:10px;
  display:none;
}

.highlight {
  background: rgba(139,92,246,0.4);
  padding:2px;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="container">

<h2>MindMirror</h2>

<textarea id="input"></textarea>

<button onclick="run()">Analyze Text</button>
<button onclick="sample()">Load Sample</button>

<div id="status"></div>

<div id="output" class="card"></div>

<canvas id="chart" class="card"></canvas>

</div>

<script>

let chart;

function sample(){
  document.getElementById("input").value =
  "I always fail everything. This is the worst day ever. I will never succeed.";
}

function run(){
  const text = document.getElementById("input").value;
  const status = document.getElementById("status");

  status.innerText = "Running analysis...";

  try {
    const result = analyze(text);

    render(result);

    status.innerText = "Done ✔";

  } catch (e) {
    console.error(e);
    status.innerText = "Error occurred (check console)";
  }
}

function analyze(text){

  if(!text || text.trim().length === 0){
    throw new Error("Empty input");
  }

  const patterns = {
    catastrophizing: /(worst|terrible|hopeless|ruined|disaster)/gi,
    overgeneralization: /(always|never|every|nobody)/gi,
    absolutist: /(completely|totally|must|perfect)/gi
  };

  let counts = {
    catastrophizing: 0,
    overgeneralization: 0,
    absolutist: 0
  };

  let safeText = text;

  // SAFE replacement (no index math = no crashes)
  for (let key in patterns) {
    safeText = safeText.replace(patterns[key], (m) => {
      counts[key]++;
      return `<mark>${m}</mark>`;
    });
  }

  return { text, safeText, counts };
}

function render(data){

  // ALWAYS SHOW OUTPUT FIRST (critical fix)
  const out = document.getElementById("output");
  const chartEl = document.getElementById("chart");

  out.style.display = "block";
  chartEl.style.display = "block";

  out.innerHTML = `
    <h3>Detected Patterns</h3>
    <p>${data.safeText}</p>
    <ul>
      <li>Catastrophizing: ${data.counts.catastrophizing}</li>
      <li>Overgeneralization: ${data.counts.overgeneralization}</li>
      <li>Absolutist: ${data.counts.absolutist}</li>
    </ul>
  `;

  // SAFE chart reset
  if(chart) chart.destroy();

  const ctx = chartEl.getContext("2d");

  chart = new Chart(ctx, {
    type:"bar",
    data:{
      labels:Object.keys(data.counts),
      datasets:[{
        data:Object.values(data.counts),
        backgroundColor:["red","orange","purple"]
      }]
    },
    options:{
      plugins:{ legend:{ display:false } }
    }
  });
}

</script>

</body>
</html>
