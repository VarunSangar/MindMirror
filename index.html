<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMirror — Cognitive Pattern Analysis</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
/* ===================== SAME DESIGN (UNCHANGED) ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8f0;
  --text2: #9090b0;
  --blue: #4f8ef7;
  --purple: #8b5cf6;
  --green: #10b981;
  --red: #ef4444;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}
textarea {
  width: 100%;
  min-height: 160px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  color: var(--text);
  font-size: 15px;
}
button {
  cursor: pointer;
}

/* keep rest of styling minimal for brevity */
.card { padding: 1rem; border: 1px solid var(--border); border-radius: 12px; margin-top: 1rem; }
</style>
</head>

<body>

<div style="max-width:900px;margin:0 auto;padding:2rem">

<h1>MindMirror</h1>
<p style="color:var(--text2)">Cognitive Insight Engine (Finalist Upgrade)</p>

<textarea id="userInput" placeholder="Type your thoughts..."></textarea>

<br><br>

<button onclick="runAnalysis()" style="padding:10px 20px;border-radius:10px;background:var(--purple);color:white;border:none;">
Analyze Text
</button>

<div id="output" class="card" style="display:none"></div>

</div>

<script>

/* ===================== 1. PSYCHOLOGICAL THEMES ===================== */

const THEMES = {
  relationships: {
    keywords: ["partner","friends","love","relationship","dating","boyfriend","girlfriend","romantic"],
    insight: "This text centers around interpersonal connection and perceived emotional validation."
  },
  selfWorth: {
    keywords: ["not enough","failure","worthless","stupid","failure","useless","enough"],
    insight: "This reflects internalized self-evaluation and identity-linked self-worth distortion."
  },
  achievement: {
    keywords: ["school","grades","career","job","success","future","college","fail"],
    insight: "This reflects performance-based cognitive pressure and outcome fixation."
  }
};

/* ===================== 2. DISTORTIONS (UPGRADED EXPLANATIONS) ===================== */

const DISTORTIONS = {
  catastrophizing: {
    label: "Catastrophizing",
    explain: "The mind amplifies negative outcomes into worst-case scenarios, treating emotional fear as prediction.",
    reframes: [
      "This feels overwhelming, but the situation is not as absolute as it appears.",
      "What feels like collapse is often just temporary difficulty in disguise.",
      "Your mind is projecting worst-case outcomes, not guaranteed ones."
    ]
  },

  overgeneralization: {
    label: "Overgeneralization",
    explain: "A single experience is expanded into a permanent rule about life or identity.",
    reframes: [
      "One pattern does not define your entire experience.",
      "This is a moment, not a lifelong rule.",
      "Variation exists even when your mind sees repetition."
    ]
  },

  emotional: {
    label: "Emotional Reasoning",
    explain: "Feelings are treated as direct evidence of reality.",
    reframes: [
      "Feelings are signals, not conclusions.",
      "Emotion reflects experience, not objective truth.",
      "What you feel is real — but not always factual."
    ]
  }
};

/* ===================== 3. ANALYSIS ENGINE ===================== */

function detectThemes(text) {
  const t = text.toLowerCase();
  const found = [];

  for (const [key, val] of Object.entries(THEMES)) {
    if (val.keywords.some(k => t.includes(k))) {
      found.push(val);
    }
  }

  return found;
}

function detectDistortions(text) {
  const t = text.toLowerCase();
  const results = [];

  for (const [key, d] of Object.entries(DISTORTIONS)) {
    if (
      key === "catastrophizing" && /(worst|ruined|destroyed|terrible|awful)/.test(t) ||
      key === "overgeneralization" && /(always|never|every time|nobody|everyone)/.test(t) ||
      key === "emotional" && /(i feel|i feel like|feels like)/.test(t)
    ) {
      results.push({
        type: key,
        ...d
      });
    }
  }

  return results;
}

/* ===================== 4. INSIGHT GENERATION (BIG UPGRADE) ===================== */

function generateInsight(text, distortions, themes) {

  const themeText = themes.length
    ? themes.map(t => t.insight).join(" ")
    : "The text reflects internal cognitive processing without a dominant life domain.";

  const distortionText = distortions.length
    ? distortions.map(d => d.explain).join(" ")
    : "No strong cognitive distortions are dominant in this passage.";

  return `
This analysis suggests a layered cognitive pattern.

${themeText}

${distortionText}

Rather than reflecting objective truth, the language appears shaped by interpretation filters — especially in how meaning is assigned to events.

Shifting from absolute interpretations to contextual thinking can significantly change emotional perception over time.
  `.trim();
}

/* ===================== 5. REFRAMING (VARIATION ENGINE) ===================== */

function generateReframe(type) {
  const pool = DISTORTIONS[type]?.reframes || ["This thought can be viewed from multiple perspectives."];
  return pool[Math.floor(Math.random() * pool.length)];
}

/* ===================== 6. MAIN ===================== */

function runAnalysis() {

  const text = document.getElementById("userInput").value;
  const output = document.getElementById("output");

  if (!text || text.length < 5) return;

  const distortions = detectDistortions(text);
  const themes = detectThemes(text);

  const insight = generateInsight(text, distortions, themes);

  const reframes = distortions.map(d => ({
    label: d.label,
    original: text,
    reframe: generateReframe(d.type)
  }));

  output.style.display = "block";

  output.innerHTML = `
    <h2>Psychological Insight</h2>
    <p style="white-space:pre-line;color:var(--text2)">${insight}</p>

    <h3 style="margin-top:1rem">Detected Patterns</h3>
    <ul>
      ${distortions.length ? distortions.map(d => `<li><b>${d.label}</b> — ${d.explain}</li>`).join("") : "<li>No strong distortions detected</li>"}
    </ul>

    <h3 style="margin-top:1rem">Cognitive Reframes</h3>
    ${reframes.map(r => `
      <div class="card">
        <b>${r.label}</b>
        <p style="color:var(--text2)">Original: ${r.original}</p>
        <p style="color:var(--green)">Reframe: ${r.reframe}</p>
      </div>
    `).join("")}
  `;
}

</script>

</body>
</html>
